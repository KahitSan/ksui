<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231d4ed8'/%3E%3Ctext x='16' y='22' font-family='Arial,sans-serif' font-size='17' font-weight='700' fill='%23fff' text-anchor='middle'%3Ek%3C/text%3E%3C/svg%3E"
    />
    <meta name="description" content="ksui: shared SolidJS UI components by the KahitSan team." />
    <title>ksui docs</title>
    <script>
      // Set the theme class on <html> before the page paints so there is no
      // flash of the wrong theme. This mirrors the real app: it reads the same
      // "ks-erp-theme" localStorage key, falls back to the system preference,
      // then to the app default of dark.
      (function () {
        try {
          var saved = localStorage.getItem("ks-erp-theme");
          var theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia &&
                  window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";
          document.documentElement.classList.add(theme);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
