name: Publish @kahitsan/ksui

# Publishes the package to GitHub Packages (GHCR npm registry) on a version tag.
# ksui ships SOURCE (no esbuild dist): it is a SolidJS component library consumed
# via its `solid` export condition — the consumer's vite-plugin-solid compiles it.
# So there is no dist to build; we run a light sanity grep on the shipped source
# (no kernel internal must leak in) and publish.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@kahitsan"
      - name: Source sanity assertion (no kernel internal / sign capability)
        run: |
          npm pack
          tar -xzf *.tgz
          if grep -REq "signIdentity|@ks-erp/kernel|KSERP_INTERNAL_SECRET" package/src package/*.d.ts; then
            echo "::error::a kernel internal or sign capability leaked into the source package"; exit 1
          fi
          # The package must actually ship its declared entry points.
          for f in src/index.ts host-ui.d.ts; do
            test -f "package/$f" || { echo "::error::published tarball is missing $f"; exit 1; }
          done
          echo "source sanity OK (entry points present, no leak)"
      - name: Publish to GitHub Packages
        run: npm publish
        env:
          # setup-node's generated .npmrc keys on NODE_AUTH_TOKEN; the committed
          # repo .npmrc keys on ${GITHUB_TOKEN}. Provide BOTH so whichever .npmrc
          # npm reads resolves to the real token.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
