name: Release

# Changesets-driven release. On every push to main:
#  - if there are pending changesets, this opens (or updates) a "version packages"
#    pull request that bumps the version and writes the changelog.
#  - when that pull request is merged (version already bumped, no changesets left),
#    this publishes the new version to the public npm registry.
#
# Requires the repo secret NPM_TOKEN (an npm automation / 2fa-bypass token for the
# kahitsan org), and the repo setting Actions -> "Allow GitHub Actions to create
# and approve pull requests" so the version PR can be opened.
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          scope: "@kahitsan"
      - run: npm install
      - name: Create version PR or publish
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
