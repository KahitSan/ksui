name: Deploy docs

# Builds the docs site and deploys it to Cloudflare Pages (project "ksui",
# served at https://ksui.kahitsan.com). Runs on every push to main.
#
# Requires repo secrets CLOUDFLARE_API_TOKEN (a token with Account -> Cloudflare
# Pages: Edit) and CLOUDFLARE_ACCOUNT_ID.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: deploy-docs-${{ github.ref }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install deps
        run: |
          # Root deps (lucide-solid, solid-js) are needed because the docs build
          # compiles the ksui source under ../src, whose imports resolve from the
          # root node_modules.
          npm install
          npm --prefix docs install
      - name: Build docs
        run: npm --prefix docs run build
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@latest pages deploy docs/dist --project-name ksui --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
